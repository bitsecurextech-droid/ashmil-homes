<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Details – Ashmil Homes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Manrope', sans-serif; background: #f8fafc; }
    .bg-navy { background-color: #0A1A2F; }
    .bg-navy-deep { background-color: #051020; }
    .text-gold { color: #D4AF37; }
    .gradient-gold { background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); }
    .thumbnail { cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
    .thumbnail:hover { border-color: #D4AF37; transform: scale(1.05); }
    .thumbnail.active { border-color: #D4AF37; }
  </style>
</head>
<body>

<header class="bg-navy text-white sticky top-0 z-50 shadow-md">
  <div class="container mx-auto px-4 py-3 flex justify-between items-center">
    <a href="/" class="flex items-center gap-2"><img src="https://hotgistloaded.com.ng/wp-content/uploads/2026/05/logo-ashmil-DAwsa8ai.jpg" class="w-10 h-10 rounded-full"><span class="font-serif font-bold">Ashmil Homes</span></a>
    <nav class="hidden md:flex gap-6"><a href="/">Home</a><a href="/properties">Properties</a><a href="/about">About</a><a href="/contact">Contact</a></nav>
  </div>
</header>

<main class="container mx-auto px-4 py-12">
  <div id="details" class="bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="p-6 md:p-8">
      <div id="loading" class="text-center py-12">Loading property details...</div>
      <div id="error" class="text-center py-12 text-red-500 hidden">Property not found.</div>
      <div id="content" class="grid md:grid-cols-2 gap-8 hidden">
        <!-- LEFT COLUMN: Image Gallery -->
        <div>
          <!-- Main Image -->
          <img id="mainImage" src="" class="w-full h-96 object-cover rounded-xl shadow-md mb-3">
          
          <!-- Thumbnail Gallery (all images) -->
          <div id="imageGallery" class="flex gap-2 overflow-x-auto pb-2"></div>
          
          <!-- Image counter -->
          <p id="imageCounter" class="text-xs text-gray-400 mt-2"></p>
        </div>
        
        <!-- RIGHT COLUMN: Property Info -->
        <div>
          <h1 id="title" class="font-serif text-3xl md:text-4xl font-bold mb-2"></h1>
          <p id="location" class="text-gray-500 mb-2"><i data-lucide="map-pin" class="w-4 h-4 inline mr-1 text-gold"></i><span id="locationText"></span></p>
          <p id="price" class="text-2xl text-gold font-bold mb-4"></p>
          <div id="specs" class="flex gap-4 mb-4 text-gray-700"></div>
          <p id="description" class="text-gray-600 leading-relaxed mb-6"></p>
          
          <!-- Video Section -->
          <div id="videoContainer" class="mt-4 hidden">
            <h3 class="font-serif text-lg font-semibold mb-2"><i data-lucide="video" class="w-5 h-5 inline mr-2 text-gold"></i>Property Video</h3>
            <div id="videoPlayer" class="rounded-xl overflow-hidden"></div>
          </div>
          
          <!-- CTA -->
          <div class="border-t pt-6 mt-4">
            <h3 class="font-serif text-xl font-semibold mb-4">Interested?</h3>
            <p class="text-gray-600 mb-4">Speak directly with our team to schedule an inspection or request more details.</p>
            <div class="flex flex-wrap gap-4">
              <a href="tel:07074404637" class="gradient-gold text-navy px-5 py-2 rounded-md font-semibold shadow-md flex items-center gap-2"><i data-lucide="phone" class="w-4 h-4"></i> Call us (0707 440 4637)</a>
              <a href="tel:09023967106" class="border border-navy text-navy px-5 py-2 rounded-md font-semibold hover:bg-navy hover:text-white flex items-center gap-2"><i data-lucide="phone" class="w-4 h-4"></i> Alt. line (0902 396 7106)</a>
              <a href="mailto:Ashmilhomesnigerialimited@gmail.com" class="border border-gold text-gold px-5 py-2 rounded-md font-semibold flex items-center gap-2"><i data-lucide="mail" class="w-4 h-4"></i> Email Us</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="bg-navy-deep text-white text-center py-6 text-sm">© 2025 Ashmil Homes Nigeria Limited</footer>

<script>
  document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  console.log('🔍 Property ID:', id);
  
  if (id && id !== 'undefined' && id !== 'null') {
    fetch(`/api/properties/${id}`)
      .then(res => res.json())
      .then(p => {
        console.log('✅ Property loaded:', p);
        
        // Basic info
        document.getElementById('title').innerText = p.title || 'No title';
        document.getElementById('locationText').innerText = p.location || 'Unknown location';
        document.getElementById('price').innerText = p.price ? `₦${p.price}` : 'Price on request';
        document.getElementById('description').innerText = p.description || 'No description available.';
        
        // Specs
        let specs = '';
        if (p.bedrooms) specs += `<span><i data-lucide="bed-double" class="w-4 h-4 inline mr-1"></i> ${p.bedrooms} beds</span>`;
        if (p.bathrooms) specs += `<span><i data-lucide="bath" class="w-4 h-4 inline mr-1"></i> ${p.bathrooms} baths</span>`;
        if (p.area) specs += `<span><i data-lucide="maximize" class="w-4 h-4 inline mr-1"></i> ${p.area}</span>`;
        document.getElementById('specs').innerHTML = specs || '<span>No specs provided</span>';
        
        // ====== IMAGE GALLERY (SHOW ALL IMAGES) ======
        const images = p.images || [];
        const mainImg = document.getElementById('mainImage');
        const gallery = document.getElementById('imageGallery');
        const counter = document.getElementById('imageCounter');
        
        if (images.length === 0) {
          mainImg.src = 'https://via.placeholder.com/800x600?text=No+Images';
          gallery.innerHTML = '<p class="text-gray-400 text-sm">No images uploaded</p>';
          counter.innerText = '0 images';
        } else {
          // Set first image as main
          mainImg.src = images[0];
          counter.innerText = `${images.length} image${images.length > 1 ? 's' : ''}`;
          
          // Create thumbnails for ALL images
          gallery.innerHTML = '';
          images.forEach((img, index) => {
            const thumb = document.createElement('img');
            thumb.src = img;
            thumb.className = `thumbnail w-20 h-20 object-cover rounded-md ${index === 0 ? 'active border-gold' : 'border-gray-200'}`;
            thumb.onerror = () => { thumb.src = 'https://via.placeholder.com/80?text=Error'; };
            thumb.addEventListener('click', () => {
              // Change main image
              mainImg.src = img;
              // Update active thumbnail
              document.querySelectorAll('.thumbnail').forEach(t => {
                t.classList.remove('active', 'border-gold');
                t.classList.add('border-gray-200');
              });
              thumb.classList.add('active', 'border-gold');
              thumb.classList.remove('border-gray-200');
            });
            gallery.appendChild(thumb);
          });
        }
        
        // ====== VIDEO (YouTube) ======
        if (p.video) {
          document.getElementById('videoContainer').classList.remove('hidden');
          const url = p.video;
          let html = '';
          
          // Extract YouTube video ID from various URL formats
          const ytRegex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/;
          const match = url.match(ytRegex);
          
          if (match) {
            const videoId = match[1];
            // Embed with clickable YouTube link overlay
            html = `
              <div class="relative">
                <iframe width="100%" height="400" src="https://www.youtube.com/embed/${videoId}" 
                  frameborder="0" allowfullscreen class="rounded-xl shadow-md"></iframe>
                <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank" 
                  class="absolute bottom-4 right-4 bg-black/70 text-white text-sm px-4 py-2 rounded-full hover:bg-black/90 transition flex items-center gap-2">
                  <i data-lucide="external-link" class="w-4 h-4"></i> Watch on YouTube
                </a>
              </div>
            `;
          } else {
            // Fallback: direct embed
            html = `<iframe width="100%" height="400" src="${url}" frameborder="0" allowfullscreen class="rounded-xl shadow-md"></iframe>`;
          }
          
          document.getElementById('videoPlayer').innerHTML = html;
          lucide.createIcons();
        }
        
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
        lucide.createIcons();
      })
      .catch(err => {
        console.error('❌ Error:', err);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('error').innerText = 'Property not found. Please go back and try again.';
      });
  } else {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.remove('hidden');
    document.getElementById('error').innerText = 'No property ID provided.';
  }
</script>
</body>
</html>
