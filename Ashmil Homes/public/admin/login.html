<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Ashmil Homes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Manrope', sans-serif; background: linear-gradient(135deg, #0A1A2F 0%, #051020 100%); }
    .login-card { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="login-card max-w-md w-full rounded-2xl shadow-2xl p-8">
    <div class="text-center mb-6">
      <!-- Logo -->
      <img src="https://hotgistloaded.com.ng/wp-content/uploads/2026/05/logo-ashmil-DAwsa8ai.jpg" alt="Ashmil Homes Logo" class="w-20 h-20 rounded-full mx-auto ring-4 ring-gold/30 shadow-lg mb-3">
      <h2 class="font-serif text-2xl font-bold text-navy">Ashmil Homes</h2>
      <p class="text-gray-500 text-sm">Admin Portal</p>
    </div>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gold focus:border-gold transition" placeholder="admin@ashmil.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gold focus:border-gold transition" placeholder="••••••••">
      </div>
      <button type="submit" class="w-full bg-gradient-to-r from-gold to-gold/80 text-navy font-semibold py-2 rounded-lg shadow-md hover:shadow-lg transition">Login</button>
      <div id="error" class="text-red-500 text-sm text-center mt-2"></div>
    </form>
    <div class="text-center text-xs text-gray-400 mt-6">
      <span>Secure admin access only</span>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = '/admin/dashboard';
        } else {
          document.getElementById('error').innerText = data.error || 'Invalid credentials';
        }
      } catch (err) {
        document.getElementById('error').innerText = 'Network error. Please try again.';
      }
    });
  </script>
</body>
</html>
